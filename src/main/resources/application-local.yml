spring:
  datasource:
    url: jdbc:mysql://localhost:3306/booking?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: booking
    password: bookingpw
    hikari:
      maximum-pool-size: 20
      minimum-idle: 20
      connection-timeout: 2000
      validation-timeout: 1000
      max-lifetime: 1800000
      leak-detection-threshold: 10000
      pool-name: booking-hikari
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4

logging:
  level:
    com.example.booking: DEBUG
