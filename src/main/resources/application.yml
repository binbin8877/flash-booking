# ============================================================
# Spring 기본
# ============================================================
spring:
  application:
    name: flash-booking
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 30
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ============================================================
# 서버 / Tomcat
# ============================================================
server:
  port: 8080
  tomcat:
    threads:
      max: 200
    accept-count: 200
    connection-timeout: 3s

# ============================================================
# Actuator / 헬스체크
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,retries,bulkheads
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    circuitbreakers:
      enabled: true

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ============================================================
# 비즈니스 설정 (TTL, sweeper, PG)
#   - 자바 측 바인딩은 com.example.booking.config.* (HoldProperties 등)
# ============================================================
app:
  node-id: ${APP_NODE_ID:local}
  hold:
    ttl-seconds: 300          # hold 키 TTL (5분) — sweeper backstop 주기와 정렬, DECISIONS 결정 7 참고
    sweep-cron: "0 */5 * * * *" # 5분마다 sweeper 실행 (event-driven release 가 primary, polling 은 backstop)
  idempotency:
    ttl-seconds: 900          # 멱등키 TTL (15분) — DECISIONS 결정 9 참고
  sweeper:
    batch-size: 100           # 한 번에 처리할 PG 환불 후보 행 수
  payment:
    pg:
      mode: mock              # mock | real (현재 mock 만 구현)
      timeout-ms: 3000        # PG WebClient 응답 대기

# ============================================================
# Resilience4j — Circuit Breaker / Bulkhead / Retry / RateLimiter
# ============================================================
resilience4j:
  # ---------- Circuit Breaker ----------
  circuitbreaker:
    instances:
      redis:
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        recordExceptions:
          - org.springframework.dao.QueryTimeoutException
          - org.springframework.data.redis.RedisConnectionFailureException
          - org.springframework.data.redis.RedisSystemException
          - io.lettuce.core.RedisCommandTimeoutException
          - io.lettuce.core.RedisConnectionException
          - java.net.ConnectException
          - java.io.IOException
      pg:
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        # 비즈니스 실패(success=false)는 회로에 기록하지 않는다 — 인프라 예외만 카운트.
        recordExceptions:
          - java.lang.RuntimeException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - com.example.booking.application.payment.PaymentFailedException
  # ---------- Bulkhead ----------
  bulkhead:
    instances:
      pg:
        maxConcurrentCalls: 50
        maxWaitDuration: 100ms
  # ---------- Retry ----------
  retry:
    instances:
      redis:
        maxAttempts: 2
        waitDuration: 100ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisCommandTimeoutException
          - java.net.ConnectException
  # ---------- Rate Limiter ----------
  ratelimiter:
    instances:
      booking:
        # 노드당 500 req/sec — 2 노드 = 시스템 1000 req/sec 수용.
        # 피크 가정 (자정 1~5분 500~1000 TPS) 를 *수용 한도* 로 둠.
        # 초과 시 즉시 429 — 큐 대기 (timeoutDuration 0) 로 cascade 차단.
        limitForPeriod: 500
        limitRefreshPeriod: 1s
        timeoutDuration: 0
  # TimeLimiter 는 CompletableFuture 반환을 요구하므로 PG 가 동기 구현인 본 코드에서는 미사용.
  # 비동기 전환 시 charge() 반환을 CompletableFuture<PgChargeResponse> 로 바꾸고 활성화.
